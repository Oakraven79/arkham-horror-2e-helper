<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arkham Horror Card</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=IM+Fell+English&display=swap');

body {
  background: #2b2b2b;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}



.card {
  position: relative;
  width: 330px;
  aspect-ratio: 55/88;
  background: radial-gradient(circle at 50% 30%, #f5e6c4 0%, #e0cfa9 60%, #d4b98b 100%);
  border: 8px solid #1d1d1d;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: 'IM Fell English', serif;
  flex-shrink: 0;  /* don’t let flexbox squeeze it */
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;   /* scale + crop */
  object-position: center;
  display: block;      /* removes baseline spacing */
}


.mythoscardfront {
  width: 330px;
  aspect-ratio: 55/88;
  position: relative;
  
  background-color: #bebebe; /* parchment tan, shows through PNG transparency */
  border: 8px solid #1d1d1d;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: 'IM Fell English', serif;
  flex-shrink: 0;  /* don’t let flexbox squeeze it */
  background-image: url('mythos front.png');
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover; /* or contain (see below) */
}

/* bottom-right box */
.corner-box {
  position: absolute;
  bottom: 0.5rem;  /* ✅ anchors it at bottom */
  right: 0.5rem;   /* ✅ anchors it at right */


  display: flex;
  flex-direction: column;

  height: 25%;    /* 🟢 25% of card height */
  width: 55%;

  border: 3px solid #1d1d1d;   /* 🟢 border here */
  box-shadow: 0 0 10px #1d1d1d;


  border-radius: 6px;
  overflow: hidden;
  text-align: center;
  font-size: 0.8rem;
  z-index: 3; /* keeps it above background */
}

.corner-box .top,
.corner-box .bottom {
  flex: 1; /* each half fills 50% of the box height */
  display: flex;
  align-items: center;
  justify-content: center;
}

.corner-box .top {
  background: rgb(211, 211, 211); /* semi-transparent red for demo */
  color: #000;
  padding: 0.25rem;
}

.corner-box .bottom {
  background: #000;
  color: #fff;
  padding: 0.25rem;
}


.circle-badge {
  position: absolute;
  bottom: 7%;
  left: 2.5%;

  width: 34%;   /* make it a square */
  aspect-ratio: 1;
  border-radius: 50%;       /* 🟢 makes it a circle */
  border: 3px solid #1d1d1d;   /* 🟢 border here */
  box-shadow: 0 0 10px #1d1d1d;
  overflow: hidden;         /* ensures image stays inside circle */
  z-index: 1;
}

.circle-badge img {
  width: 100%;
  height: 100%;
  object-fit: cover;   /* fills circle without distortion */
  display: block;
}

.square-badge {
  position: absolute;
  bottom: 0.5rem;  /* ✅ anchors it at bottom */       /* adjust so it overlaps the circle */
  left: 1.5%;   /* ✅ anchors it at right */
  width: 35%;         /* size of the square */
  height: 9%;
  background: #ddd; /* semi-transparent red for demo */
  border: 3px solid #1d1d1d;   /* 🟢 border here */
  box-shadow: 0 0 10px #1d1d1d;
  z-index: 2;          /* lower than circle to sit underneath */
  border-radius: 6px;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  

}

.text-overlay {
  position: absolute;
  top: 1%;    /* center vertically */
 

  width: 80%;   /* control how wide the box is */
  padding: 1rem;

  background:transparent; /* 🟢 semi-transparent black */

  text-align: center;
    
  justify-content: center;
  border-radius: 8px;
  z-index: 3;
}



</style>
</head>
<body>

<!-- Cards are 55mm x 88mm  for mythos, encounter and otherworld encounter -->



<div class="card">
  <div class="image"><img src="otherworld_encounter.jpg"></div>
</div>

<div class="card">
  <div class="image"><img src="mythos_backing.jpg"></div>
</div>



<div class="mythoscardfront">

  <div class="text-overlay">
Fourth Of July Parade!

  </div>


  <div class="corner-box">
    <div class="top">+2</div>
    <div class="bottom">Horror</div>
  </div>

  <div class="circle-badge">
    <img src="old-house.jpg" alt="icon">
  </div>

  <div class="square-badge">The Witch<br>House</div>

</div>

</body>
</html>
