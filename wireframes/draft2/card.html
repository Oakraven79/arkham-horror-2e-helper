<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arkham Horror Card</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=IM+Fell+English&display=swap');

body {
  background: #2b2b2b;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  position: relative;
  width: 275px;
  height: 440px;
  background: radial-gradient(circle at 50% 30%, #f5e6c4 0%, #e0cfa9 60%, #d4b98b 100%);
  border: 8px solid #1d1d1d;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: 'IM Fell English', serif;
  flex-shrink: 0;  /* don’t let flexbox squeeze it */
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;   /* scale + crop */
  object-position: center;
  display: block;      /* removes baseline spacing */
}


.mythoscardfront {
  width: 275px;
  height: 440px;
  position: relative;
  
  background-color: #bebebe; /* parchment tan, shows through PNG transparency */
  border: 8px solid #1d1d1d;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: 'IM Fell English', serif;
  flex-shrink: 0;  /* don’t let flexbox squeeze it */
  background-image: url('mythos front.png');
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover; /* or contain (see below) */
}

/* bottom-right box */
.corner-box {
  position: absolute;
  bottom: 0.5rem;  /* ✅ anchors it at bottom */
  right: 0.5rem;   /* ✅ anchors it at right */


  display: flex;
  flex-direction: column;

  height: 25%;    /* 🟢 25% of card height */
  width: 55%;

  border: 3px solid #1d1d1d;   /* 🟢 border here */
  box-shadow: 0 0 10px #1d1d1d;


  border-radius: 6px;
  overflow: hidden;
  text-align: center;
  font-size: 0.8rem;
  z-index: 3; /* keeps it above background */
}

.corner-box .top,
.corner-box .bottom {
  flex: 1; /* each half fills 50% of the box height */
  display: flex;
  align-items: center;
  justify-content: center;
}

.corner-box .top {
  background: rgb(211, 211, 211); /* semi-transparent red for demo */
  color: #000;
  padding: 0.25rem;
}

.corner-box .bottom {
  background: #000;
  color: #fff;
  padding: 0.25rem;
}


.circle-badge {
  position: absolute;
  bottom: 7%;
  left: 1.8%;

  width: 95px;   /* make it a square */
  height: 95px;
  border-radius: 50%;       /* 🟢 makes it a circle */
  border: 3px solid #1d1d1d;   /* 🟢 border here */
  box-shadow: 0 0 10px #1d1d1d;
  overflow: hidden;         /* ensures image stays inside circle */
  z-index: 1;
}

.circle-badge img {
  width: 100%;
  height: 100%;
  object-fit: cover;   /* fills circle without distortion */
  display: block;
}

.square-badge {
  position: absolute;
  bottom: 0.5rem;  /* ✅ anchors it at bottom */       /* adjust so it overlaps the circle */
  left: 1.5%;   /* ✅ anchors it at right */
  width: 35%;         /* size of the square */
  height: 9%;
  background: #ddd; /* semi-transparent red for demo */
  border: 3px solid #1d1d1d;   /* 🟢 border here */
  box-shadow: 0 0 10px #1d1d1d;
  z-index: 2;          /* lower than circle to sit underneath */
  border-radius: 6px;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  

}


/* Title Ribbon */
.title {
  background: linear-gradient(#6b1f1f, #3b0d0d);
  color: #f5e6c4;
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 1.6em;
  padding: 8px;
  text-shadow: 1px 1px 2px #000;
  border-bottom: 3px solid #000;
}

/* Image window */
.image {
  flex: 0 0 40%;
  background: radial-gradient(circle, #3c6da6 0%, #142942 80%);
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 3px solid #000;
  color: white;
  font-size: 1.4em;
  font-style: italic;
}

/* Effect Box */
.effect {
  flex: 1;
  padding: 12px;
  font-size: 1.05em;
  line-height: 1.4em;
  background: rgba(240, 230, 200, 0.85);
  border-bottom: 2px solid #000;
}

/* Flavor text */
.flavor {
  font-style: italic;
  font-size: 0.95em;
  padding: 10px;
  background: rgba(220, 210, 180, 0.9);
  text-align: center;
}
</style>
</head>
<body>

<!-- Cards are 55mm x 88mm  for mythos, encounter and otherworld encounter -->

<div class="card">
  <div class="title">Gate Opens!</div>
  <div class="image">[Vortex Art]</div>
  <div class="effect">
    A swirling vortex appears at the <strong>Unvisited Isle</strong>.<br>
    Spawn a monster there immediately.
  </div>
  <div class="flavor">
    “The wind shifts suddenly... carrying with it a scent of the distant ocean.”
  </div>
</div>

<div class="card">
  <div class="image"><img src="otherworld_encounter.jpg"></div>
</div>

<div class="card">
  <div class="image"><img src="mythos_backing.jpg"></div>
</div>

<div class="mythoscardfront">
  <div class="corner-box">
    <div class="top">+2</div>
    <div class="bottom">Horror</div>
  </div>

  <div class="circle-badge">
    <img src="old-house.jpg" alt="icon">
  </div>

  <div class="square-badge">The Witch<br>House</div>

</div>

</body>
</html>
